<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CommutingValue Terms and Conditions</title>
  <meta name="description" content="Terms and conditions for using CommutingValue." />
  <meta name="theme-color" content="#0f2134" />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://commutingvalue.com/terms.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="CommutingValue" />
  <meta property="og:title" content="CommutingValue Terms and Conditions" />
  <meta property="og:description" content="Terms and conditions for commute estimate usage." />
  <meta property="og:url" content="https://commutingvalue.com/terms.html" />
  <meta property="og:image" content="https://commutingvalue.com/assets/logo-wordmark.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="CommutingValue Terms and Conditions" />
  <meta name="twitter:description" content="Terms and conditions for using CommutingValue." />
  <meta name="twitter:image" content="https://commutingvalue.com/assets/logo-wordmark.svg" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
    :root{--bg:#eef2f4;--panel:#fff;--text:#162737;--muted:#627384;--border:#d7dee6;--shadow:0 16px 40px rgba(22,39,55,.08);--accent:#18374d;font-family:"Avenir Next","Segoe UI",Arial,sans-serif}
    *{box-sizing:border-box} body{margin:0;color:var(--text);background:radial-gradient(900px 340px at 8% -4%,rgba(24,55,77,.08),transparent 60%),linear-gradient(180deg,var(--bg),#e8edf2)}
    .wrap{max-width:900px;margin:0 auto;padding:26px 16px 64px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
    .logo{width:220px;height:auto;display:block}.nav{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid var(--border);border-radius:10px;padding:9px 11px;text-decoration:none;color:var(--text);background:#fff;font-weight:600}
    .lang-switch{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:999px;padding:7px 10px;background:#fff}
    .lang-dot{width:16px;height:16px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:linear-gradient(145deg,#18374d,#2f627f)}
    .lang-select{border:0;background:transparent;font-size:12px;font-weight:700;color:var(--text);min-width:120px;outline:none;appearance:none}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:22px}
    h1{margin:0 0 10px;font-size:32px;letter-spacing:-.5px}p{line-height:1.58;color:#33495f}
  </style>
</head>
<body>
  <main class="wrap">
    <header class="top">
      <img class="logo" src="assets/logo-wordmark.svg" alt="CommutingValue logo" />
      <nav class="nav">
        <div class="lang-switch">
          <span class="lang-dot" aria-hidden="true">◉</span>
          <label class="sr-only" for="langSelect">Language</label>
          <select id="langSelect" class="lang-select" aria-label="Language">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
            <option value="no">Norsk</option>
            <option value="sv">Svenska</option>
            <option value="de">Deutsch</option>
          </select>
        </div>
        <a class="btn" id="navCalc" href="index.html">Calculator</a>
        <a class="btn" id="navTracker" href="tracker.html">Tracker</a>
        <a class="btn" id="navInfo" href="info.html">Info</a>
      </nav>
    </header>
    <article class="card">
      <h1 id="termsTitle">Terms and Conditions</h1>
      <p id="p1">CommutingValue provides informational estimates for commute time and financial burden.</p>
      <p id="p2">Results are approximations and not financial, tax, legal, or employment advice.</p>
      <p id="p3">You are responsible for validating figures before making decisions.</p>
    </article>
  </main>
  <script>
    const I18N = {
      en: {
        pageTitle: "CommutingValue Terms and Conditions",
        navCalc: "Calculator", navTracker: "Tracker", navInfo: "Info", termsTitle: "Terms and Conditions",
        p1: "CommutingValue provides informational estimates for commute time and financial burden.",
        p2: "Results are approximations and not financial, tax, legal, or employment advice.",
        p3: "You are responsible for validating figures before making decisions."
      },
      es: {
        pageTitle: "CommutingValue Términos y condiciones",
        navCalc: "Calculadora", navTracker: "Rastreador", navInfo: "Información", termsTitle: "Términos y condiciones",
        p1: "CommutingValue ofrece estimaciones informativas del tiempo de desplazamiento y la carga financiera.",
        p2: "Los resultados son aproximados y no constituyen asesoramiento financiero, fiscal, legal o laboral.",
        p3: "Eres responsable de validar las cifras antes de tomar decisiones."
      },
      zh: {
        pageTitle: "CommutingValue 条款与条件",
        navCalc: "计算器", navTracker: "追踪器", navInfo: "信息", termsTitle: "条款与条件",
        p1: "CommutingValue 提供关于通勤时间与经济负担的信息性估算。",
        p2: "结果为近似值，不构成财务、税务、法律或雇佣建议。",
        p3: "在做出决策前，你应自行核实相关数据。"
      },
      no: {
        pageTitle: "CommutingValue Vilkår",
        navCalc: "Kalkulator", navTracker: "Tracker", navInfo: "Info", termsTitle: "Vilkår",
        p1: "CommutingValue gir informative estimater for pendletid og økonomisk belastning.",
        p2: "Resultatene er omtrentlige og er ikke finans-, skatte-, juridisk- eller arbeidsrådgivning.",
        p3: "Du er ansvarlig for å verifisere tallene før du tar beslutninger."
      },
      sv: {
        pageTitle: "CommutingValue Villkor",
        navCalc: "Kalkylator", navTracker: "Tracker", navInfo: "Info", termsTitle: "Villkor",
        p1: "CommutingValue ger informativa uppskattningar av pendlingstid och ekonomisk belastning.",
        p2: "Resultaten är ungefärliga och är inte finansiell, skatte-, juridisk eller arbetsrättslig rådgivning.",
        p3: "Du ansvarar själv för att verifiera siffrorna innan beslut fattas."
      },
      de: {
        pageTitle: "CommutingValue Nutzungsbedingungen",
        navCalc: "Rechner", navTracker: "Tracker", navInfo: "Info", termsTitle: "Nutzungsbedingungen",
        p1: "CommutingValue liefert informative Schätzungen zu Pendelzeit und finanzieller Belastung.",
        p2: "Die Ergebnisse sind Näherungswerte und keine Finanz-, Steuer-, Rechts- oder Arbeitsberatung.",
        p3: "Du bist dafür verantwortlich, Zahlen vor Entscheidungen zu prüfen."
      }
    };

    function applyLanguage(lang) {
      const current = I18N[lang] ? lang : "en";
      localStorage.setItem("cv_lang", current);
      document.documentElement.lang = current === "zh" ? "zh-CN" : current;
      document.title = I18N[current].pageTitle;
      document.getElementById("langSelect").value = current;
      ["navCalc","navTracker","navInfo","termsTitle","p1","p2","p3"].forEach((id) => {
        document.getElementById(id).textContent = I18N[current][id];
      });
    }

    const saved = localStorage.getItem("cv_lang") || "en";
    applyLanguage(saved);
    document.getElementById("langSelect").addEventListener("change", (e) => applyLanguage(e.target.value));
  </script>
</body>
</html>
